spring.application.name=vehicle-booking-system
spring.profiles.active=dev

security.rate-limit.login.capacity=10
security.rate-limit.login.refill-tokens=10
security.rate-limit.login.refill-duration=1m
security.rate-limit.register.capacity=5
security.rate-limit.register.refill-tokens=5
security.rate-limit.register.refill-duration=1m
security.rate-limit.phone-otp.capacity=3
security.rate-limit.phone-otp.refill-tokens=3
security.rate-limit.phone-otp.refill-duration=1m
security.rate-limit.bucket-ttl=30m
security.rate-limit.bucket-cleanup-interval=5m

booking.expiration.pending-payment-timeout=15m
booking.expiration.cleanup-interval=5m
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=20260415.0001
spring.flyway.baseline-description=existing_schema_baseline
spring.flyway.validate-on-migrate=true

management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics,loggers
management.endpoint.health.show-details=when-authorized

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
cloudinary.folder=${CLOUDINARY_FOLDER:vehicle-booking/cars}

goong.api-key=${GOONG_API_KEY:}
viettelai.token=${VIETTELAI_TOKEN:}
ekyc.local-service-url=${EKYC_LOCAL_URL:http://localhost:8001}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# Gemini AI (chatbot)
gemini.api-key=${GEMINI_API_KEY:}
